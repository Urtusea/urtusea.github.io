theme:
  # 主题名字
  name: material
  
  # 语言 & 字体
  language: zh

  # 自定义图标
  logo: 'images/Kizuna_Ai.svg'
  favicon: 'images/Kizuna_Ai.svg'

  # 滚动效果
  features:
    - navigation.tabs
    - header.autohide
    - content.code.copy
  
  # 明暗切换
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/link
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/toggle-switch
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: indigo
    toggle:
      icon: material/toggle-switch-off
      name: Switch to system preference

# markdown 模块
markdown_extensions:
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - markdown_katex

# 自定义 CSS
extra_css:
  # - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/katex@0.13.11/dist/katex.min.css

# 自定义 JS
extra_javascript:
  - javascripts/extra.js
  - https://cdn.jsdelivr.net/npm/katex@0.13.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.13.11/dist/contrib/auto-render.min.js